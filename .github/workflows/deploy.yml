# Push to main → rsync to pinchards.is/adrift/ on DreamHost (SSH).
#
# Repository secrets (Settings → Secrets and variables → Actions):
# FTP_SERVER, FTP_USERNAME, FTP_SERVER_DIR, SSH_DEPLOY_KEY
#
# Copy the same four values from adamsimms/pinchards.is (they must match exactly).
# FTP_SERVER: SSH hostname only (e.g. psNNNN.dreamhost.com) — no user@, port, or path.
# FTP_SERVER_DIR: absolute site root (e.g. /home/USER/pinchards.is); workflow appends /adrift/
# SSH_DEPLOY_KEY: ed25519 private key; paste PEM or base64-encode: base64 < key | pbcopy
name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: rsync dry-run (no files changed on server)
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Verify JS bundle
        run: |
          npm ci
          npm run build:js
          git diff --exit-code jsm/h106.js

      - name: Setup SSH deploy key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_DEPLOY_KEY}" ]; then
            echo "Missing secret: SSH_DEPLOY_KEY"
            exit 1
          fi
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          if [[ "${SSH_DEPLOY_KEY}" == *"BEGIN"* ]]; then
            printf '%s\n' "${SSH_DEPLOY_KEY}" | tr -d '\r' > ~/.ssh/deploy_key
          else
            printf '%s' "${SSH_DEPLOY_KEY}" | tr -d ' \t\r\n' | base64 -d > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
          fi
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "SSH_DEPLOY_KEY is not a valid OpenSSH private key; trying base64 decode..."
            printf '%s' "${SSH_DEPLOY_KEY}" | tr -d ' \t\r\n' | base64 -d > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
          fi
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::SSH_DEPLOY_KEY is invalid in GitHub Secrets."
            echo "On your Mac run: base64 < ~/.ssh/pinchards_deploy | pbcopy"
            echo "Paste that single line as SSH_DEPLOY_KEY (replace the existing secret)."
            exit 1
          fi
          echo "Deploy key fingerprint: $(ssh-keygen -lf ~/.ssh/deploy_key | awk '{print $2}')"
          host="$(printf '%s' "${FTP_SERVER}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [[ "${host}" == *"@"* ]]; then
            echo "::error::FTP_SERVER must be hostname only. Use iad1-shared-b8-36.dreamhost.com — put pinchard in FTP_USERNAME, not FTP_SERVER."
            exit 1
          fi
          if [[ "${host}" == *"/"* ]] || [[ "${host}" == *"://"* ]] || [[ "${host}" == *":"* ]]; then
            echo "::error::FTP_SERVER must be hostname only (no port, path, or sftp://)."
            exit 1
          fi
          ssh-keyscan -H "${host}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Validate deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -euo pipefail
          trim() { printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          FTP_SERVER="$(trim "${FTP_SERVER}")"
          FTP_USERNAME="$(trim "${FTP_USERNAME}")"
          FTP_SERVER_DIR="$(trim "${FTP_SERVER_DIR}")"
          for name in FTP_SERVER FTP_USERNAME FTP_SERVER_DIR; do
            if [ -z "${!name}" ]; then
              echo "Missing secret: ${name}"
              exit 1
            fi
          done
          if [[ "${FTP_SERVER}" == *"@"* ]] || [[ "${FTP_SERVER}" == *"://"* ]] || [[ "${FTP_SERVER}" == *"/"* ]] || [[ "${FTP_SERVER}" == *":"* ]]; then
            echo "::error::FTP_SERVER must be hostname only (e.g. psNNNN.dreamhost.com)."
            echo "Do not include user@, port :22, sftp://, or a path."
            exit 1
          fi
          if [[ "${FTP_SERVER_DIR}" != /* ]]; then
            echo "::error::FTP_SERVER_DIR must be an absolute path (e.g. /home/USER/pinchards.is), not a relative folder name."
            exit 1
          fi
          if [[ "${FTP_SERVER_DIR}" == *"@"* ]] || [[ "${FTP_SERVER_DIR}" == *"://"* ]]; then
            echo "::error::FTP_SERVER_DIR must be a path only. Put the hostname in FTP_SERVER and username in FTP_USERNAME."
            exit 1
          fi
          echo "FTP_SERVER resolves next; FTP_SERVER_DIR length: ${#FTP_SERVER_DIR}"

      - name: Test SSH connection
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        run: |
          set -euo pipefail
          host="$(printf '%s' "${FTP_SERVER}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          user="$(printf '%s' "${FTP_USERNAME}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          echo "FTP_USERNAME length: ${#user}"
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=20 -p 22 \
            "${user}@${host}" "echo SSH OK from GitHub Actions"

      - name: SFTP deploy (rsync over SSH)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -euo pipefail
          host="$(printf '%s' "${FTP_SERVER}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          user="$(printf '%s' "${FTP_USERNAME}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          server_dir="$(printf '%s' "${FTP_SERVER_DIR}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          server_dir="${server_dir%/}/adrift/"
          dry_run=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            dry_run="--dry-run"
          fi
          dest="${host}:${server_dir}"
          echo "rsync target: ${dest}"
          rsync -avzr --delete ${dry_run} \
            --exclude '.git/' \
            --exclude '.git*/' \
            --exclude '.github/' \
            -e "ssh -i ${HOME}/.ssh/deploy_key -o BatchMode=yes -o IdentitiesOnly=yes -p 22 -l ${user}" \
            ./ "${dest}"
